<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異界塔 — 戰鬥</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="battle-wrap">

  <div class="battle-header">
    <button class="btn btn-ghost" style="padding:6px 14px;font-size:.85em" onclick="goBack()">← 返回</button>
    <h2 id="floor-title"></h2>
  </div>

  <div class="battle-body">

    <!-- 雙方 -->
    <div class="combatants">
      <div class="combatant player">
        <span class="c-icon">🧙</span>
        <div class="c-name" id="p-name"></div>
        <div class="c-hp-label"><span>HP</span><span id="p-hp-text"></span></div>
        <div class="bar c-hp-bar"><div class="bar-fill" id="p-hp-bar"></div></div>
      </div>

      <div class="vs-badge">VS</div>

      <div class="combatant enemy">
        <span class="c-icon" id="e-icon">👹</span>
        <div class="c-name" id="e-name"></div>
        <div class="c-hp-label"><span>HP</span><span id="e-hp-text"></span></div>
        <div class="bar c-hp-bar"><div class="bar-fill" id="e-hp-bar"></div></div>
      </div>
    </div>

    <!-- 回合紀錄 -->
    <div class="battle-log" id="battle-log"></div>

    <!-- 行動按鈕 -->
    <div class="action-panel" id="action-panel">
      <div class="row">
        <button class="btn btn-red"     onclick="act('attack')">⚔ 普通攻擊</button>
        <button class="btn btn-primary" onclick="act('defend')">🛡 防禦姿態</button>
      </div>
      <div class="row">
        <button class="btn btn-ghost"   onclick="act('flee')">🏃 嘗試逃跑</button>
      </div>
    </div>

  </div>
</div>

<!-- 結果 -->
<div class="result-overlay" id="result-overlay">
  <div class="result-box">
    <h2 id="result-title"></h2>
    <p  id="result-desc"></p>
    <button class="btn btn-primary" style="width:100%" onclick="goBack()">返回主畫面</button>
  </div>
</div>

<script src="assets/game.js"></script>
<script>
const MONSTER_ICONS = ['👹','🕷','🦀','💀','👺','🤺','🐙','🐜','🦇','❄'];

let currentUser, char, monster, battle;

function init() {
  currentUser = loadState('currentUser');
  if (!currentUser) { location.href = 'index.html'; return; }
  const accounts = loadState('accounts') || {};
  char    = accounts[currentUser].char;
  monster = getMonster(char.towerFloor);

  // 戰鬥狀態（含 char_hp 分開追蹤，不影響主角色）
  battle = {
    charHp:    char.hp,
    monsterHp: monster.hp,
    rounds:    0,
    over:      false,
  };

  // 頁面初始化
  const isBoss = monster.isBoss;
  document.getElementById('floor-title').textContent =
    `第 ${char.towerFloor} 層${isBoss ? ' ★ BOSS' : ''}`;
  document.getElementById('e-icon').textContent =
    isBoss ? '👑' : MONSTER_ICONS[(char.towerFloor - 1) % MONSTER_ICONS.length];
  if (isBoss) document.getElementById('e-icon').style.filter =
    'drop-shadow(0 0 14px rgba(245,166,35,.7))';

  render();
  addLog('⚔ 戰鬥開始！', 'system');

  // 敵人先手
  if (monster.spd > char.agi) {
    addLog(`${monster.name} 速度較快，先手攻擊！`, 'system');
    setActions(false);
    setTimeout(() => { enemyTurn(false); if (!battle.over) setActions(true); }, 700);
  }
}

// ── 玩家行動 ─────────────────────────────────────────────────
function act(action) {
  if (battle.over) return;
  setActions(false);

  if (action === 'flee') {
    const chance = 0.30 + char.cha * 0.02;
    if (Math.random() < chance) {
      addLog('成功逃脫！', 'system');
      setTimeout(goBack, 1000);
      return;
    }
    addLog('逃跑失敗！敵人反擊！', 'enemy');
    setTimeout(() => { enemyTurn(false); if (!battle.over) setActions(true); }, 500);
    return;
  }

  if (action === 'defend') {
    addLog('你擺出防禦姿態，本回合傷害減半。', 'player');
    setTimeout(() => { enemyTurn(true); if (!battle.over) setActions(true); }, 500);
    return;
  }

  // 普通攻擊
  if (Math.random() < dodgeChance(monster.spd)) {
    addLog(`${monster.name} 閃避了你的攻擊！`, 'enemy');
  } else {
    const { dmg, crit } = calcDamage(char.str, monster.def, char.per);
    battle.monsterHp = Math.max(0, battle.monsterHp - dmg);
    render();
    addLog(
      crit ? `暴擊！你對 ${monster.name} 造成 ${dmg} 點傷害！`
           : `你對 ${monster.name} 造成 ${dmg} 點傷害。`,
      crit ? 'crit' : 'player'
    );
  }

  if (battle.monsterHp <= 0) { win(); return; }
  battle.rounds++;
  setTimeout(() => { enemyTurn(false); if (!battle.over) setActions(true); }, 500);
}

// ── 敵人回合 ─────────────────────────────────────────────────
function enemyTurn(playerDefending) {
  if (Math.random() < dodgeChance(char.agi)) {
    addLog(`你閃避了 ${monster.name} 的攻擊！`, 'player');
  } else {
    let { dmg, crit } = calcDamage(monster.atk, Math.floor(char.str / 3));
    if (playerDefending) dmg = Math.max(1, Math.floor(dmg / 2));
    battle.charHp = Math.max(0, battle.charHp - dmg);
    render();
    addLog(
      crit ? `${monster.name} 暴擊！你受到 ${dmg} 點傷害！`
           : `${monster.name} 攻擊你，受到 ${dmg} 點傷害。`,
      crit ? 'crit' : 'enemy'
    );
  }
  if (battle.charHp <= 0) lose();
}

// ── 勝負 ─────────────────────────────────────────────────────
function win() {
  battle.over = true;
  setActions(false);

  // EXP & 升級
  char.exp += monster.expReward;
  let leveled = false;
  const stats = ['str','agi','vit','wis','per','cha'];
  while (char.exp >= char.expMax) {
    char.exp -= char.expMax;
    char.level++;
    char.expMax = char.level * 100;
    stats.forEach(s => char[s]++);
    char.maxHp = 80 + char.vit * 5;
    leveled = true;
  }
  char.hp = battle.charHp;
  char.towerFloor++;
  saveChar();

  const desc = leveled
    ? `獲得 ${monster.expReward} EXP 並升級至 Lv.${char.level}！進入第 ${char.towerFloor} 層。`
    : `獲得 ${monster.expReward} EXP！進入第 ${char.towerFloor} 層。`;
  showResult('win', '勝利！', desc);
}

function lose() {
  battle.over = true;
  setActions(false);
  const recovered = Math.max(1, Math.floor(char.maxHp * 0.3));
  char.hp = recovered;
  saveChar();
  showResult('lose', '敗北...', `HP 回復至 ${recovered}，停留在第 ${char.towerFloor} 層。`);
}

// ── UI ───────────────────────────────────────────────────────
function render() {
  document.getElementById('p-name').textContent    = `${char.name} Lv.${char.level}`;
  document.getElementById('p-hp-text').textContent = `${battle.charHp} / ${char.maxHp}`;
  document.getElementById('p-hp-bar').style.width  = Math.max(0, battle.charHp / char.maxHp * 100) + '%';
  document.getElementById('e-name').textContent    = monster.name;
  document.getElementById('e-hp-text').textContent = `${battle.monsterHp} / ${monster.maxHp}`;
  document.getElementById('e-hp-bar').style.width  = Math.max(0, battle.monsterHp / monster.maxHp * 100) + '%';
}

function addLog(msg, type = '') {
  const log = document.getElementById('battle-log');
  const d   = document.createElement('div');
  d.className = `log-line ${type}`;
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function setActions(on) {
  document.querySelectorAll('#action-panel button').forEach(b => b.disabled = !on);
}

function showResult(type, title, desc) {
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-title').className   = type;
  document.getElementById('result-desc').textContent  = desc;
  document.getElementById('result-overlay').classList.add('show');
}

function saveChar() {
  const accounts = loadState('accounts') || {};
  accounts[currentUser].char = char;
  saveState('accounts', accounts);
}

function goBack() { saveChar(); location.href = 'game.html'; }

init();
</script>
</body>
</html>
